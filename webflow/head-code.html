<style>
  /* Прелоудер виден с первого кадра, до запуска preloader.js.
     Без этого Webflow дефолт скрывал .preloader через display:none
     (или другой класс), и при переходе на новую страницу был flash —
     юзер видел сайт ~10-50ms ДО того как JS его покрыл прелоудером.
     Дефолт visible решает: страница рендерится сразу с прелоудером
     поверх, JS потом красиво гасит через fade-out. */
  .preloader {
    display: flex;
    opacity: 1;
    pointer-events: auto;
    z-index: 99999;
  }
</style>
